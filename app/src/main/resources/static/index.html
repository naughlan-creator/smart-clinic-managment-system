<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>SCMS: Select Your Role</title>
        <link rel="icon" href="../assets/images/logo/logo.png">
        <link rel="stylesheet" href="../assets/css/index.css">
        <link rel="stylesheet" href="../assets/css/style.css">
        <script src="../js/util.js" defer></script>
        <script src="../js/render.js" defer></script>
        <script src="../js/components/header.js" defer></script>
        <script src="../js/components/footer.js" defer></script>
    </head>

    <body>
        <main class="main-content" id="mainContent">
            <div class="container" id="container">
                <div class="wrapper" id="wrapper">
                    <div id="header"></div>

                    <section id="roleSelectionSection">
                        <h2 id="roleHeading">Select Your Role</h2>
                        <div class="role-buttons">
                            <button id="admin-btn" onclick="selectRole('Admin')">Admin</button>
                            <button id="patient-btn" onclick="selectRole('Patient')">Patient</button>
                            <button id="doctor-btn" onclick="selectRole('Doctor')">Doctor</button>
                        </div>
                    </section>

                    <div id="footer"></div>
                </div>
            </div>
        </main>

        <div id="modal" class="modal" hidden>
            <div class="modal-content" id="modalContent">
                <button id="closeModal" type="button">&times;</button>
                <div id="modal-body">

                </div>
            </div>
        </div>

        <script type="module" src="../js/services/index.js" defer></script>
    </body>
</html>
